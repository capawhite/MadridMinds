  <style>
    :root { --bg:#1C1814; --cream:#F5F0E8; --muted:#B8AFA0; --terracotta:#C4603A; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--cream); font-family:'Jost',sans-serif; min-height:100vh; padding-top:86px; }
    .site-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(28,24,20,.95);border-bottom:1px solid rgba(184,175,160,.14);padding:.68rem 1.4rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;backdrop-filter:blur(4px)}

    .site-nav-logo{height:56px;width:auto;display:block}

    .site-nav-dropdown{position:relative}
    .site-nav-dropdown-toggle{background:transparent;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:.35rem}
    .site-nav-caret{font-size:11px;opacity:.8}
    .site-nav-dropdown-menu{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);min-width:165px;padding:.45rem;border-radius:12px;border:1px solid rgba(184,175,160,.16);background:var(--bg);box-shadow:0 14px 30px rgba(0,0,0,.35);display:none;z-index:120}
    .site-nav-dropdown:hover .site-nav-dropdown-menu,.site-nav-dropdown:focus-within .site-nav-dropdown-menu{display:grid;gap:2px}
    .site-nav-dropdown-item{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cream);text-decoration:none;padding:.55rem .65rem;border-radius:8px;opacity:.88}
    .site-nav-dropdown-item:hover{background:#2A2520;opacity:1}
    .site-nav-link[aria-current="page"]{color:var(--cream);opacity:1;text-decoration:underline;text-decoration-color:var(--terracotta);text-underline-offset:4px}
    .site-nav-cta{border:1px solid rgba(196,96,58,.75);background:rgba(196,96,58,.16);color:var(--cream);padding:.45rem .8rem;border-radius:999px;opacity:1}
    .site-nav-cta:hover{background:rgba(196,96,58,.3)}
    main { max-width:860px; margin:0 auto; padding:4rem 1.5rem; text-align:center; }
    h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(2.4rem,6vw,4rem); margin-bottom:1rem; }
    p { color:var(--muted); line-height:1.8; font-size:1.05rem; }
    @media (max-width:720px){.site-nav{padding:.9rem 1rem;gap:.7rem;grid-template-columns:1fr}.site-nav-links{width:100%;gap:.7rem}}

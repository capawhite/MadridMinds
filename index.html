<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madrid Minds — Where Curious Minds Meet</title>
  <meta name="description" content="Meet interesting people, enjoy Spanish wines and tapas, and discover chess in a relaxed, premium setting. 100% in English." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e1117;
      --surface: #141920;
      --cream: #f5f0e8;
      --muted: #8a8a8a;
      --accent: #c9a96e;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
      letter-spacing: 0.01em;
    }

    main {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 300;
      line-height: 1;
      text-align: center;
      color: var(--cream);
      letter-spacing: -0.01em;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0.6;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-style: italic;
      font-weight: 300;
      color: var(--cream);
      text-align: center;
      opacity: 0.85;
      letter-spacing: 0.02em;
    }

    .description {
      font-size: 0.925rem;
      line-height: 1.8;
      text-align: center;
      color: #b0aba0;
      max-width: 520px;
      margin-top: 1.75rem;
    }

    .form-wrapper {
      margin-top: 2.75rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .form-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .beehiiv-embed {
      width: 560px;
      height: 291px;
      margin: 0;
      border-radius: 0px !important;
      background: transparent !important;
      background-color: transparent !important;
      box-shadow: none !important;
      max-width: 100%;
      border: none !important;
    }

    iframe.beehiiv-embed {
      filter: none;
    }

    .form-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    div:has(> iframe.beehiiv-embed) {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    footer {
      margin-top: 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .instagram-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      transition: color 0.2s ease;
    }

    .instagram-link:hover {
      color: var(--cream);
    }

    .instagram-link svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }

    .instagram-link:hover svg {
      opacity: 1;
    }

    .coming-soon-badge {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-top: 0.25rem;
    }

    @media (max-width: 480px) {
      body {
        padding: 2.5rem 1.25rem;
        justify-content: flex-start;
        padding-top: 4rem;
      }

      .description {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <main>
    <h1>Madrid Minds</h1>

    <div class="divider"></div>

    <p class="tagline">Where curious minds meet</p>

    <p class="description">
      Meet interesting people, enjoy Spanish wines and tapas, and discover chess in a relaxed, premium setting — 100% in English.
    </p>

    <div class="form-wrapper">
      <p class="form-label">Be the first to know when we launch — join the list</p>
      <script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
      <iframe
        src="https://subscribe-forms.beehiiv.com/99a27d92-3bee-4026-9c32-33556a386d08?background=transparent"
        class="beehiiv-embed"
        data-test-id="beehiiv-embed"
        frameborder="0"
        scrolling="no"
        style="width: 560px; height: 291px; margin: 0; border-radius: 0px 0px 0px 0px !important; background-color: transparent; box-shadow: 0 0 #0000; max-width: 100%;"
      ></iframe>
    </div>

    <footer>
      <a
        href="https://instagram.com/madridminds"
        target="_blank"
        rel="noopener noreferrer"
        class="instagram-link"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        @madridminds
      </a>
      <p class="coming-soon-badge">Madrid, Spain &middot; 2026</p>
    </footer>
  </main>

</body>
</html>
